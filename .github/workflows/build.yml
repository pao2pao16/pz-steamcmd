name: Build PZ SteamCMD Image

on:
  push:
    branches: [main, java25]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tags
        id: tags
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tags=ghcr.io/pao2pao16/pz-steamcmd:debian,ghcr.io/pao2pao16/pz-steamcmd:latest" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "java25" ]; then
            echo "tags=ghcr.io/pao2pao16/pz-steamcmd:java25" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
